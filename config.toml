# pkg_robots 設定（実装プラン §1.1）
[vault]
path = "/Users/bobtk/pkg_vault"
# インデックス対象から除外するパス（前方一致 or パス断片）
exclude_prefixes = ["_depot/", "9_Templates/", "plan/", "_Reports/", ".obsidian/", ".trash/"]
exclude_fragments = ["/Assets/"]

[index]
db_path = "data/garden.db"
stats_path = "data/stats.json"
# 日本語+markdown はトークン膨張が激しい（実測: 3450字が bge-m3 の 8192tok を超過）。
# 節ノート中央値 2.3k字 → 2000字は粒度として妥当
chunk_max_chars = 2000

[embed]
# Ollama /api/embed（未起動なら埋め込みパスは自動スキップ）
endpoint = "http://localhost:11434"
# O2 決着（2026-07-03）: bge-m3-8k 採用。
#   bge-m3-8k(2000字):  recall@10=48.9% / ruri-large(600字, 512tok制約): recall@10=25.5%
# 非対称モデル用 prefix（ruri 等）。bge-m3 は不要なので空
model = "bge-m3-8k"
query_prefix = ""
passage_prefix = ""

[judge]
# OpenAI 互換。プロトタイプ=ローカル Ollama、本配線=DGX でホストする LLM-jp-4（M6 で URL 差し替え）
endpoint = "http://localhost:11434/v1"
model = ""

[candidates]
# 実測（gold=6/26 レポート確度高47件）: recall@10=51.1% / recall@30=63.8%。
# 候補段は recall 重視で 30 に設定し、絞り込みは judge（M3）が担う。
# 残る深い miss（語彙が重ならない概念的接続 ≈36%）は Phase 2 GraphRAG / ハイブリッド検索の領域
top_k = 30
min_similarity = 0.45
